<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rex Character Roulette</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background: #000;
            color: #f5f5f7;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        h1{
            font-size: 42px;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }
        .subtitle{
            color: #a1a1a6;
            margin-bottom: 30px;
        }
        .card{
            background: rgba(255,255,255,0.05 );
            backdrop-filter: blur(20px);
            border:1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 24px;
            max-width: 350px;
            text-align: center;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .card img{
            width: 200px;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .card h2 {
            font-size: 22px;
            margin-bottom: 8px;
        }
        .card p {
            font-size: 14px;
            color: #a1a1a6;
            line-height: 1.5;
        }
        button{
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
            background: #0a84ff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }
        .loading{
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Character Roulette 🎲</h1>
    <p class="subtitle">Roll for a random anime character</p>

    <div class="card" id="card">
        <p class="loading">Press the button to roll</p>
    </div>

    <button id="rollBtn">Roll 🎲</button>

    <script src="new.js"></script>
</body>
</html>
